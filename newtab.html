<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Days Left</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="container">
    <div id="setup-screen" class="hidden">
      <h1>Set Your Target Date</h1>
      <div class="form-group">
        <input type="text" id="event-name" placeholder="Event name (e.g., Graduation)" autocomplete="off">
      </div>
      <div class="form-group">
        <input type="date" id="target-date">
      </div>
      <button id="save-btn" class="btn-primary">Start Counting</button>
    </div>

    <div id="dashboard" class="hidden">
      <div class="countdown-container">
        <div class="countdown-stack">
          <div class="countdown-card">
            <div class="countdown" id="countdown">0</div>
            <div class="countdown-label">Days Left</div>
          </div>
          <div class="countdown-card secondary">
            <div class="countdown countdown-small" id="weeks-count">0</div>
            <div class="countdown-label">Weeks Left</div>
          </div>
        </div>
      </div>

      <div class="event-title" id="event-title"></div>

      <div class="date-info">
        <div class="date-row">
          <span class="label">Target Date:</span>
          <span id="target-date-display"></span>
        </div>
        <div class="date-row">
          <span class="label">Today:</span>
          <span id="current-date-display"></span>
        </div>
      </div>
      
      <div class="quote-container">
        <div class="quote" id="quote"></div>
      </div>

      <div class="actions">
        <button id="edit-btn" class="btn-secondary">Edit</button>
        <button id="reset-btn" class="btn-danger">Reset</button>
      </div>
    </div>

    <div id="celebration" class="hidden">
      <div class="celebration-content">
        <div class="celebration-text" id="celebration-text">Target Reached!</div>
        <div class="celebration-event" id="celebration-event"></div>
      </div>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <div id="edit-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Edit Target</h2>
      <div class="form-group">
        <input type="text" id="edit-event-name" placeholder="Event name">
      </div>
      <div class="form-group">
        <input type="date" id="edit-target-date">
      </div>
      <div class="modal-actions">
        <button id="save-edit-btn" class="btn-primary">Save</button>
        <button id="cancel-edit-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="date-utils.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
